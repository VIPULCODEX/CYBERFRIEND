services:
  # ─── 1. Backend API (FastAPI + Gunicorn multi-worker) ──────────────────────
  - type: web
    name: quantx-api
    env: python
    plan: free
    rootDir: cybersecurity_friend
    buildCommand: pip install -r requirements.txt
    # 1 uvicorn worker to prevent Out-Of-Memory crashes on 512MB Free Tier
    # Each API key still gives 10 async concurrency inside this 1 worker.
    startCommand: >
      gunicorn api:app
      --workers 1
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:$PORT
      --timeout 120
      --keep-alive 5
      --max-requests 1000
      --max-requests-jitter 100
      --log-level warning
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: GROQ_API_KEYS
        sync: false   # Set in Render dashboard (comma separated multiple keys)
      - key: GROQ_API_KEY
        sync: false   # Fallback single key
      - key: NEWS_API_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: "1"    # Gunicorn respects this env var too

  # ─── 2. Frontend UI (Streamlit) ────────────────────────────────────────────
  - type: web
    name: quantx-ui
    env: python
    plan: free
    rootDir: cybersecurity_friend
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: GROQ_API_KEYS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
