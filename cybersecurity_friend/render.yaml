services:
  # ─── 1. Backend API (FastAPI + Gunicorn multi-worker) ──────────────────────
  - type: web
    name: quantx-api
    env: python
    plan: free
    rootDir: cybersecurity_friend
    buildCommand: pip install -r requirements.txt
    # 4 uvicorn workers sharing the same event loop.
    # Each worker handles up to MAX_CONCURRENT_LLM_CALLS=10 Groq calls.
    # Total theoretical capacity: 4 × 10 = 40 simultaneous LLM calls.
    # Cached responses: unlimited concurrency (no LLM needed).
    startCommand: >
      gunicorn api:app
      --workers 4
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:$PORT
      --timeout 120
      --keep-alive 5
      --max-requests 1000
      --max-requests-jitter 100
      --log-level warning
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: GROQ_API_KEYS
        sync: false   # Set in Render dashboard (comma separated multiple keys)
      - key: GROQ_API_KEY
        sync: false   # Fallback single key
      - key: NEWS_API_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: "4"    # Gunicorn respects this env var too

  # ─── 2. Frontend UI (Streamlit) ────────────────────────────────────────────
  - type: web
    name: quantx-ui
    env: python
    plan: free
    rootDir: cybersecurity_friend
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: GROQ_API_KEYS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
