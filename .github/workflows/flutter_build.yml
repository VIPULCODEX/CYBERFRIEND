name: Build Flutter APK

on:
  push:
    paths:
      - 'cyber_intel_app/**' # Only run when Flutter code changes
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # Uses a stable Flutter version
          channel: 'stable'

      - name: Get Dependencies
        working-directory: ./cyber_intel_app
        run: flutter pub get

      - name: Build APK
        working-directory: ./cyber_intel_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QuantX-Cyber-Intel-App
          path: cyber_intel_app/build/app/outputs/flutter-apk/app-release.apk
